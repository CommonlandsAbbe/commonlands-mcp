name = "commonlands-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true
# Pin the account so wrangler does not call /memberships (which an account-scoped
# API token cannot access, surfacing as auth error 9106). Account ID is not secret.
account_id = "14ca1f93f046023d8a189dc7b61032c0"

[observability]

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]

[vars]
FOV_LIVE_BACKEND_ENABLED = "true"
FOV_LAMBDA_ENDPOINT = "https://ia97wrz7ag.execute-api.us-west-2.amazonaws.com/default/fov"
# When "true", compute_fov_catalog omits partNums so the FoV Lambda scans its full
# DynamoDB lens table (covers the entire live catalog, not the in-code fixture).
# REQUIRES ALLOW_LENS_SCAN=true on the Lambda. Set to "false" to fall back to
# sending the fixture SKUs if the Lambda scan is ever disabled.
FOV_BACKEND_SCANS_FULL_CATALOG = "true"
# Live sensor catalog (DynamoDB). Non-secret config lives here; credentials
# (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) are Worker secrets set via the
# Cloudflare dashboard or `wrangler secret put`, never committed.
SENSOR_DDB_TABLE = "SensorData-orz4gwks4bef7engytv7spr2ha-dev"
SENSOR_DDB_REGION = "us-west-2"

[[analytics_engine_datasets]]
binding = "MCP_ANALYTICS"
dataset = "commonlands_mcp_events"

# Per-IP abuse controls for the public endpoint (Workers Rate Limiting API).
# Global budget for all /mcp requests, plus a stricter budget for cart
# mutations (create_cart/update_cart) since the endpoint is unauthenticated.
# Code fails open if a binding is absent (local dev, tests).
[[unsafe.bindings]]
name = "MCP_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[unsafe.bindings]]
name = "CART_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }
